steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/devsecops-autopilot:$COMMIT_SHA"
      - .

  # Push image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/devsecops-autopilot:$COMMIT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - devsecops-autopilot
      - --image=gcr.io/$PROJECT_ID/devsecops-autopilot:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=GITLAB_PAT=GITLAB_PAT:latest,GITLAB_WEBHOOK_SECRET=GITLAB_WEBHOOK_SECRET:latest
      - --set-env-vars=PORT=8080

images:
  - "gcr.io/$PROJECT_ID/devsecops-autopilot:$COMMIT_SHA"
